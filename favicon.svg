<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#101c33"/>
      <stop offset="100%" stop-color="#050a14"/>
    </linearGradient>
    <linearGradient id="pinGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8ef1ff"/>
      <stop offset="55%" stop-color="#4cc9f0"/>
      <stop offset="100%" stop-color="#2f8fd6"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="34%" r="65%">
      <stop offset="0%" stop-color="#4cc9f0" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4cc9f0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lensGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22344c"/>
      <stop offset="100%" stop-color="#0a1220"/>
    </linearGradient>
  </defs>

  <rect width="64" height="64" rx="15" fill="url(#bgGrad)"/>
  <circle cx="32" cy="27" r="27" fill="url(#glow)"/>

  <!-- GPS signal arcs above the pin -->
  <path d="M19 13 A18.5 18.5 0 0 1 45 13" fill="none" stroke="#4cc9f0" stroke-width="2.2" stroke-linecap="round" opacity="0.45"/>
  <path d="M23.5 17.5 A12 12 0 0 1 40.5 17.5" fill="none" stroke="#7fe9ff" stroke-width="2.2" stroke-linecap="round" opacity="0.8"/>

  <!-- Pin body -->
  <path d="M32 20.5c-7.3 0-13.2 5.7-13.2 12.7 0 9.2 13.2 19.8 13.2 19.8s13.2-10.6 13.2-19.8c0-7-5.9-12.7-13.2-12.7z"
        fill="url(#pinGrad)"/>
  <path d="M32 20.5c-7.3 0-13.2 5.7-13.2 12.7 0 1.4.19 2.8.55 4.2 1.9-5.6 7.4-9.6 13.65-9.6 5.9 0 11.1 3.6 13.2 8.7.28-1.1.42-2.2.42-3.3 0-7-5.9-12.7-13.2-12.7z"
        fill="#ffffff" opacity="0.14"/>

  <!-- Camera-lens center -->
  <circle cx="32" cy="32.5" r="6.4" fill="url(#lensGrad)"/>
  <circle cx="32" cy="32.5" r="6.4" fill="none" stroke="#cdf6ff" stroke-width="1" opacity="0.55"/>
  <circle cx="32" cy="32.5" r="3.1" fill="none" stroke="#7fe9ff" stroke-width="0.9" opacity="0.6"/>
  <circle cx="29.7" cy="30.2" r="1.5" fill="#e7fbff" opacity="0.9"/>
</svg>
